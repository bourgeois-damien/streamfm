# Two FP32 controls required to interpret the final L4 waterfall:
# - compiled FP32/contiguous isolates dtype after compilation;
# - full CUDA Graph FP32/channels_last isolates dtype at the final pipeline.
# Five repetitions each, identical timing protocol to the main waterfall.

program: experiments/benchmarks/sweeps/run_benchmark_sweep.py
project: streamfm-benchmark-sweeps
entity: damien-brgs92-heriot-watt-university
method: grid
parameters:
  backend:
    value: modal
  hardware:
    value: L4
  task:
    value: stftpr
  part:
    value: model
  pipeline:
    value: audio
  execution:
    values:
      - compiled
      - cuda_graph_full
  steps:
    value: 1
  dtype:
    value: fp32
  memory_format:
    values:
      - contiguous
      - channels_last
  repeat_index:
    values:
      - 1
      - 2
      - 3
      - 4
      - 5
  matmul_precision:
    value: high
  tf32:
    value: auto
  cudnn_benchmark:
    value: false
  preallocate_model_buffers:
    value: false
  iterations:
    value: 500
  warmup:
    value: 100
  ckpt:
    value: ""

exclude:
  - execution: compiled
    memory_format: channels_last
  - execution: cuda_graph_full
    memory_format: contiguous
