# Evaluation batch : grille de combinaisons.
#
# Vérifier le nombre et le contenu des runs :
#   .venv/bin/python experiments/evaluation/run_eval_sweep.py \
#     --sweep-yaml experiments/evaluation/sweep_batch.yaml \
#     --dry-run
#
# Lancer/reprendre la grille :
#   .venv/bin/python experiments/evaluation/run_eval_sweep.py \
#     --sweep-yaml experiments/evaluation/sweep_batch.yaml \
#     --group eval-grid-v1 \
#     --resume

name: streamfm-eval-grid
project: streamfm-evals
entity: damien-brgs92-heriot-watt-university
method: grid

parameters:
  backend:
    value: modal
  hardware:
    value: L4
  task:
    value: stftpr
  split:
    value: test
  limit:
    value: 20
  selection:
    value: random
  selection_seed:
    value: 42
  seed:
    value: 42
  variant:
    values:
      - baseline
      # Ajouter ici les presets activés plus bas :
      # - quant_int8
      # - svd_50
  steps:
    values:
      - 1
      - 5
  dtype:
    values:
      - fp32
      - fp16
      - bf16
  execution:
    value: eager
  memory_format:
    value: contiguous
  crop_mode:
    value: full
  score_after_run:
    value: true
  score_include_stats:
    value: true
  score_include_per_file:
    value: false
  score_with_distillmos:
    value: true
  wandb:
    value: true

presets:
  baseline:
    config_name: streamfm_stftpr
    ckpt: streamfm_stftpr.ckpt
    config_overrides: []
  # quant_int8:
  #   config_name: streamfm_stftpr_quant
  #   ckpt: streamfm_stftpr_quant_int8.ckpt
  #   config_overrides:
  #     - model.quantization.bits=8
  # svd_50:
  #   config_name: streamfm_stftpr_svd
  #   ckpt: streamfm_stftpr_svd_50.ckpt
  #   config_overrides:
  #     - model.svd.rank_ratio=0.5

# Une règle exclut une combinaison lorsque toutes ses clés correspondent.
# Exemple à activer avec le preset quant_int8 :
# exclude:
#   - variant: quant_int8
#     dtype: fp16
exclude: []
