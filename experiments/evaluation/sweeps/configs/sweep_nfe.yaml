# Balayage NFE sur STFT phase retrieval.
#
# Question : la qualité continue-t-elle de progresser au-delà de NFE=5, ou
# se dégrade-t-elle quand la dernière évaluation du solveur approche tau=1
# (grille equidistante : dernier tau = (N-1)/N, soit 0.90 a N=10) ?
#
# Meme sous-ensemble que sweep.yaml (100 fichiers, seed 42) pour rester
# comparable a experiments/reproduction_metrics.md.
#
# Verifier :
#   .venv/bin/python experiments/evaluation/sweeps/run_eval_sweep.py \
#     --sweep-yaml experiments/evaluation/sweeps/configs/sweep_nfe.yaml --dry-run
#
# Lancer :
#   .venv/bin/python experiments/evaluation/sweeps/run_eval_sweep.py \
#     --sweep-yaml experiments/evaluation/sweeps/configs/sweep_nfe.yaml \
#     --group nfe-scaling-stftpr-v1 --resume

name: streamfm-eval-nfe
project: streamfm-evals
entity: damien-brgs92-heriot-watt-university
method: grid

parameters:
  backend:
    value: modal
  hardware:
    value: L4
  task:
    value: stftpr
  split:
    value: test
  limit:
    value: 100
  selection:
    value: random
  selection_seed:
    value: 42
  seed:
    value: 42
  variant:
    value: baseline
  solver:
    value: euler
  steps:
    values: [5, 6, 7, 8, 9, 10]
  dtype:
    value: fp32
  matmul_precision:
    value: high
  execution:
    value: eager
  memory_format:
    value: contiguous
  crop_mode:
    value: full
  score_after_run:
    value: true
  score_include_stats:
    value: true
  score_include_per_file:
    value: true
  score_with_distillmos:
    value: true
  wandb:
    value: true

presets:
  baseline:
    config_name: streamfm_stftpr
    ckpt: streamfm_stftpr.ckpt
    config_overrides: []
